<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<th:block layout:fragment="css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/pagination.css}">
</th:block>

<div layout:fragment="content">
    <!--  SECTION HERO  -->
    <section class="cinema-hero text-center text-white">
        <div class="container">
            <h1 class="display-3 fw-bold mb-4">
                Smart Cinema
            </h1>

            <p class="fs-4 text-light mb-4">
                Đặt vé phim trực tuyến mọi lúc mọi nơi
            </p>

            <a
               class="btn btn-danger btn-lg px-4">
                Khám phá phim
            </a>
        </div>
    </section>

    <!--  SECTION QUICK-BOOKING  -->
    <section class="quick-booking container my-4">
        <div class="card shadow-lg border-0" style="border-radius: 15px;">
            <div class="card-body p-4">
                <form th:action="@{/booking/quick-redirect}" method="get" id="quickBookingForm">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label small fw-bold text-secondary">1. Chọn phim</label>
                            <select class="form-select form-select-lg" name="movieId" id="movieSelect" required>
                                <option value="">-- Chọn phim đang chiếu --</option>
                                <option th:each="movie : ${activeMovies}"
                                        th:value="${movie.movieId}"
                                        th:text="${movie.title}"></option>
                            </select>
                        </div>

                        <div class="col-md-5">
                            <label class="form-label small fw-bold text-secondary">2. Chọn suất chiếu (Phòng - Giờ)</label>
                            <select class="form-select form-select-lg" name="showtimeId" id="showtimeSelect" disabled required>
                                <option value="">-- Vui lòng chọn phim trước --</option>
                            </select>
                        </div>

                        <div class="col-md-3 d-flex align-items-end">
                            <a sec:authorize="isAnonymous()"
                               th:href="@{/login}"
                               class="btn btn-danger btn-lg w-100 fw-bold py-2 shadow-sm">
                                <i class="fa-solid fa-ticket me-2"></i>ĐẶT VÉ NGAY
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!--  SECTION OVERVIEW-MOVIE  -->
    <section class="overview-movie container py-5">
        <div class="movie-grid">
            <div class="card movie-card" th:each="movie : ${movies}">
                <div class="poster-wrapper">
                    <img th:src="${movie.posterUrl}" class="movie-poster">
                </div>

                <div class="card-body d-flex flex-column">
                    <!-- TITLE -->
                    <h5 class="movie-title" th:text="${movie.title}"></h5>
                    <!-- PUSH BUTTONS DOWN -->
                    <div class="mt-auto d-flex gap-2">
                        <a th:href="@{/movies/{id}(id=${movie.movieId})}"
                           class="btn btn-light flex-fill">
                            Chi tiết
                        </a>

                        <!-- Chưa đăng nhập -->
                        <a sec:authorize="isAnonymous()"
                           th:href="@{/login}"
                           class="btn btn-danger flex-fill">
                            Đặt vé
                        </a>

                        <!-- Đã đăng nhập -->
                        <a sec:authorize="hasRole('USER')"
                           th:href="@{/user/movies/{id}/showtimes(id=${movie.movieId})}"
                           class="btn btn-danger flex-fill">
                            Đặt vé
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!--  PAGINATION -->
    <div th:replace="~{layouts/pagination :: pagination(${pageData}, ${baseUrl})}"></div>
    <script th:src="@{/js/quick-booking.js}"></script>
</div>
</html>
