<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/dashboard-base}">

<th:block layout:fragment="css">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
    <link rel="stylesheet" th:href="@{/css/pagination.css}">
</th:block>

<!-- CONTENT -->
<div layout:fragment="content">
    <div class="container-fluid">
        <!-- Header -->
        <div class="overview d-flex justify-content-between align-items-center mb-4">
            <div class="overview-title">
                <h2>Quản lý suất chiếu</h2>
            </div>

            <a th:href="@{/admin/showtimes/create}"
               class="btn-add-primary">
                <i class="bi bi-plus-circle"></i>
                Tạo suất chiếu
            </a>
        </div>

        <!-- Filter -->
        <div class="card shadow-sm mb-4">
            <div class="card-body">
                <form method="get" th:action="@{/admin/showtimes}">
                    <div class="row">
                        <!-- Bộ lọc phim -->
                        <div class="col-md-4">
                            <label class="form-label">Phim</label>
                            <select class="form-select" name="movieId">
                                <option value="">Tất cả</option>
                                <!-- Sửa movie.id -> movie.movieId và movie.title phù hợp với Entity/DTO của bạn -->
                                <option th:each="movie : ${movies}"
                                        th:value="${movie.movieId}"
                                        th:text="${movie.title}"
                                        th:selected="${param.movieId != null and param.movieId[0] == #strings.toString(movie.movieId)}"></option>
                            </select>
                        </div>

                        <!-- Bộ lọc phòng -->
                        <div class="col-md-3">
                            <label class="form-label">Phòng</label>
                            <select class="form-select" name="roomId">
                                <option value="">Tất cả</option>
                                <!-- Sửa room.id -> room.roomId và room.name -> room.roomName -->
                                <option th:each="room : ${rooms}"
                                        th:value="${room.roomId}"
                                        th:text="${room.roomName}"
                                        th:selected="${param.roomId != null and param.roomId[0] == #strings.toString(room.roomId)}"></option>
                            </select>
                        </div>

                        <!-- Bộ lọc ngày chiếu -->
                        <div class="col-md-3">
                            <label class="form-label">Ngày</label>
                            <input type="date" class="form-control" name="date" th:value="${param.date}">
                        </div>

                        <div class="col-md-2 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-search"></i> Tìm kiếm
                            </button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

        <!-- Flash Message -->
        <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
            <span th:text="${success}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
            <span th:text="${error}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Table -->
        <div class="card shadow-sm">
            <div class="card-body">
                <table class="table table-hover align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Phim</th>
                            <th>Phòng</th>
                            <th>Bắt đầu</th>
                            <th>Kết thúc</th>
                            <th>Giá vé</th>
                            <th>Trạng thái</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr th:each="showtime : ${showtimes}">
                            <td th:text="${showtime.showtimeId}"></td>
                            <td th:text="${showtime.movieTitle}"></td>
                            <td th:text="${showtime.roomName}"></td>
                            <td th:text="${#temporals.format(showtime.startTime,'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${#temporals.format(showtime.endTime,'dd/MM/yyyy HH:mm')}"></td>
                            <td th:text="${#numbers.formatDecimal(showtime.ticketPrice,0,'COMMA',0,'POINT')} + ' VNĐ'"></td>
                            <td>
                                <span th:if="${showtime.status.name() == 'DRAFT'}"
                                      class="badge bg-warning">
                                    Nháp
                                </span>

                                <span th:if="${showtime.status.name() == 'PUBLISHED'}"
                                      class="badge bg-success">
                                    Đã phát hành
                                </span>

                                <span th:if="${showtime.status.name() == 'CANCELLED'}"
                                      class="badge bg-danger">
                                    Đã hủy
                                </span>
                            </td>
                            <td>
                                <a class="btn btn-warning btn-sm"
                                   th:href="@{/admin/showtimes/edit/{id}(id=${showtime.showtimeId})}">
                                    Sửa
                                </a>

                                <form th:if="${showtime.status.name() == 'DRAFT'}"
                                      th:action="@{/admin/showtimes/{id}/publish(id=${showtime.showtimeId})}"
                                      method="post"
                                      class="d-inline">
                                    <input type="hidden" th:if="${_csrf}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                    <button type="submit"
                                            class="btn btn-success btn-sm">
                                        Phát hành
                                    </button>
                                </form>

                                <form method="post"
                                      th:action="@{/admin/showtimes/delete/{id}(id=${showtime.showtimeId})}"
                                      style="display:inline;">
                                    <button type="submit"
                                            class="btn btn-danger btn-sm"
                                            onclick="return confirm('Xóa suất chiếu này?')">
                                        Xóa
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!--  PAGINATION -->
    <div th:replace="~{layouts/pagination :: pagination(${pageData}, ${baseUrl})}"></div>
</div>
</html>
