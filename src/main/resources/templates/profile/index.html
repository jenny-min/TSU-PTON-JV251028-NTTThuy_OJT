<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layouts/dashboard-base}">

<div layout:fragment="content">

    <div class="profile-wrapper">

        <div class="profile-card p-4 p-md-5">

            <h2 class="text-center fw-bold mb-4 card-title">
                Cập nhật tài khoản
            </h2>

            <form th:action="@{/profile/update}"
                  th:object="${profileForm}"
                  method="post"
                  enctype="multipart/form-data">

                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />

                <div class="row g-3">

                    <!-- Username -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Tên đăng nhập
                        </label>

                        <input th:value="${profile.username}"
                               class="form-control"
                               readonly>
                    </div>

                    <!-- Email -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Email
                        </label>

                        <input th:value="${profile.email}"
                               class="form-control"
                               readonly>
                    </div>

                    <!-- Full Name -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Họ và tên
                        </label>

                        <input th:field="*{fullName}"
                               class="form-control">
                    </div>

                    <!-- Phone -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Số điện thoại
                        </label>

                        <input th:field="*{phone}"
                               class="form-control">
                    </div>

                    <!-- Gender -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Giới tính
                        </label>

                        <select th:field="*{gender}"
                                class="form-select">

                            <option value="">
                                -- Chọn giới tính --
                            </option>

                            <option th:each="g : ${genders}"
                                    th:value="${g}"
                                    th:text="${g.label}">
                            </option>

                        </select>
                    </div>

                    <!-- Birthday -->
                    <div class="col-md-6">
                        <label class="form-label">
                            Ngày sinh
                        </label>

                        <input th:field="*{birthday}"
                               type="date"
                               class="form-control">
                    </div>

                    <!-- Address -->
                    <div class="col-12">
                        <label class="form-label">
                            Địa chỉ
                        </label>

                        <input th:field="*{address}"
                               class="form-control">
                    </div>

                    <!-- Avatar -->
                    <div class="col-12 text-center">

                        <label class="form-label d-block">
                            Avatar
                        </label>

                        <img id="avatarPreview"
                             th:src="${profile.avatarUrl != null ? profile.avatarUrl : '/uploads/default-avatar.jpg'}"
                             class="avatar-preview mb-3"
                             alt="Avatar">

                        <input id="avatarFile"
                               type="file"
                               name="avatarFile"
                               accept="image/*"
                               class="form-control">
                    </div>

                    <!-- Submit -->
                    <div class="col-12 mt-3">

                        <button type="submit"
                                class="btn btn-danger btn-lg w-100 btn-update">

                            <i class="bi bi-check-circle me-2"></i>
                            Cập nhật

                        </button>

                    </div>

                </div>

            </form>

        </div>

    </div>

</div>

<script th:src="@{/js/profile/previewAvatar.js}"></script>

</html>
