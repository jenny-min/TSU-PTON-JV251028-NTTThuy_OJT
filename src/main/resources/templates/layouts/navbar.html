<nav th:fragment="navbar"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     class="navbar navbar-expand-lg navbar-dark cinema-navbar sticky-top">

    <div class="container">
        <!-- Logo -->
        <a class="navbar-brand fw-bold text-danger fs-3"
           th:href="@{/home}">
            Smart Cinema
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler"
                type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarCinema">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Menu -->
        <div class="collapse navbar-collapse" id="navbarCinema">
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a th:href="@{/home}" class="nav-link">Trang chủ</a>
                </li>

                <li class="nav-item">
                    <a th:href="@{/home}" class="nav-link">Phim</a>
                </li>

                <li class="nav-item">
                    <a th:href="@{/api/public/schedules}" class="nav-link">Lịch chiếu</a>
                </li>

                <li class="nav-item">
                    <a href="#" class="nav-link">Khuyến mãi</a>
                </li>
            </ul>

            <!-- Chưa đăng nhập -->
            <div sec:authorize="isAnonymous()"
                 class="d-flex gap-2">

                <a th:href="@{/login}"
                   class="btn btn-outline-danger">
                    Đăng nhập
                </a>

                <a th:href="@{/register}"
                   class="btn btn-danger">
                    Đăng ký
                </a>

            </div>

            <!-- Đã đăng nhập -->
            <div sec:authorize="isAuthenticated()"
                 class="d-flex align-items-center gap-3">

                <a th:href="@{/dashboard}"
                   class="d-flex align-items-center text-decoration-none text-white">

                    <span class="me-2">
                        Xin chào,
                        <strong sec:authentication="name"></strong>
                    </span>

<!--                    <img th:src="${#authentication.principal.user.avatarUrl != null-->
<!--                      ? #authentication.principal.user.avatarUrl-->
<!--                      : '/images/default-avatar.png'}"-->
<!--                         alt="Avatar"-->
<!--                         class="user-avatar">-->

                    <img th:src="${#authentication.principal.avatarUrl}"
                         alt="Avatar"
                         class="user-avatar">
                </a>

                <form th:action="@{/logout}" method="post" class="mb-0">
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />

                    <button type="submit"
                            class="btn btn-sm btn-outline-danger">
                        Đăng xuất
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>
