<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gray-900 text-white flex min-h-screen">

<!-- SIDEBAR -->
<aside class="w-64 bg-gray-950 p-5">

    <!-- USER INFO CARD -->
    <div class="flex flex-col items-center text-center mb-6">

        <img th:src="${#authentication.principal.user.avatarUrl != null
                      ? #authentication.principal.user.avatarUrl
                      : '/images/default-avatar.png'}"
             class="w-20 h-20 rounded-full border-4 object-cover">

        <h2 class="mt-3 font-bold text-lg">
            <span th:text="${#authentication.principal.user.username}"></span>
        </h2>
    </div>

    <!-- ADMIN MENU -->
    <div sec:authorize="hasRole('ADMIN')" class="space-y-2">
        <a th:href="@{/admin/dashboard}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-solid fa-gauge mr-2"></i> Quản lý chung
        </a>

        <a th:href="@{/admin/movies}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-solid fa-film mr-2 text-red-400"></i> Quản lý phim
        </a>

        <a th:href="@{/staff/staff}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-regular fa-user"></i> Quản lý Nhân viên
        </a>

        <a th:href="@{/admin/users}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-solid fa-users mr-2 text-blue-400"></i> Quản lý Người dùng
        </a>

        <a th:href="@{/profile}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-solid fa-user-gear"></i> Cài đặt tài khoản
        </a>

    </div>

    <!-- STAFF MENU -->
    <div sec:authorize="hasRole('STAFF')" class="space-y-2 mt-4">

        <a th:href="@{/staff/dashboard}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-regular fa-user"></i> Trang Nhân viên
        </a>

        <a th:href="@{/staff/schedules}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-regular fa-calendar"></i> Lịch chiếu
        </a>

        <a th:href="@{/staff/tickets}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-solid fa-ticket"></i> Vé đặt
        </a>

        <a th:href="@{/profile}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-solid fa-user-gear"></i> Cài đặt tài khoản
        </a>

    </div>

    <!-- USER MENU -->
    <div sec:authorize="hasRole('USER')" class="space-y-2 mt-4">

        <a th:href="@{/user/profile}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-regular fa-user"></i> Trang của tôi
        </a>

        <a th:href="@{/user/tickets}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-solid fa-ticket"></i> Vé của tôi
        </a>

        <a th:href="@{/profile}" class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-solid fa-user-gear"></i> Cài đặt tài khoản
        </a>
    </div>

    <div class="space-y-2 mt-4">
        <a th:href="~{profile/change-password}"
           class="block p-2 hover:bg-gray-800 rounded">
            <i class="fa-solid fa-key"></i> Đổi mật khẩu
        </a>

        <form th:action="@{/logout}" method="post">
            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">
            <button type="submit">Logout</button>
        </form>
    </div>
    <hr class="my-4 border-gray-700">

    <!-- COMMON -->
    <a th:href="@{/home}" class="block p-2 text-red-400 hover:bg-gray-800 rounded">
        ← Trang chủ
    </a>

</aside>

<!-- CONTENT -->
<main class="flex-1 p-6 overflow-y-auto">
    <div layout:fragment="content"></div>
</main>

</body>
</html>
