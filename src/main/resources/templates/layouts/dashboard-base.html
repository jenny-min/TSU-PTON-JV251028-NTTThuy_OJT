<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!--  fragment riêng cho CSS  -->
    <th:block layout:fragment="css"></th:block>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-light">

<div class="min-vh-100">

    <!--  DROPDOWN MENU  -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
        <div class="container-fluid">
            <div class="collapse navbar-collapse" id="navbarContent">
                <!-- LEFT MENU -->
                <ul class="navbar-nav me-auto">
                    <!-- ADMIN -->
                    <li class="nav-item dropdown" sec:authorize="hasRole('ADMIN')">
                        <a class="nav-link dropdown-toggle"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown">
                            Quản lý
                        </a>

                        <ul class="dropdown-menu">
                            <li>
                                <a class="dropdown-item"
                                   th:href="@{/admin/dashboard}">
                                    <i class="fa-solid fa-gauge me-2"></i>
                                    Quản lý chung
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   th:href="@{/admin/movies}">
                                    <i class="fa-solid fa-film me-2"></i>
                                    Quản lý phim
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   th:href="@{/admin/showtimes}">
                                    <i class="fa-solid fa-calendar me-2"></i>
                                    Quản lý lịch chiếu
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   th:href="@{/staff/staff}">
                                    <i class="fa-solid fa-user-tie me-2"></i>
                                    Quản lý nhân viên
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   th:href="@{/admin/users}">
                                    <i class="fa-solid fa-users me-2"></i>
                                    Quản lý người dùng
                                </a>
                            </li>
                        </ul>
                    </li>

                    <!-- STAFF -->
                    <li class="nav-item dropdown" sec:authorize="hasRole('STAFF')">
                        <a class="nav-link dropdown-toggle"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown">
                            Nhân viên
                        </a>

                        <ul class="dropdown-menu">
                            <li>
                                <a class="dropdown-item"
                                   th:href="@{/staff/dashboard}">
                                    <i class="fa-solid fa-user me-2"></i>
                                    Trang nhân viên
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   th:href="@{/staff/schedules}">
                                    <i class="fa-solid fa-calendar me-2"></i>
                                    Lịch chiếu
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   th:href="@{/staff/tickets}">
                                    <i class="fa-solid fa-ticket me-2"></i>
                                    Vé đặt
                                </a>
                            </li>
                        </ul>
                    </li>

                    <!-- USER -->
                    <li class="nav-item dropdown" sec:authorize="hasRole('USER')">
                        <a class="nav-link dropdown-toggle"
                           href="#"
                           role="button"
                           data-bs-toggle="dropdown">
                            <i class="fa-solid fa-list"></i>
                        </a>

                        <ul class="dropdown-menu">
                            <li>
                                <a class="dropdown-item"
                                   th:href="@{/user/dashboard}">
                                    <i class="fa-solid fa-user me-2"></i>
                                    Trang của tôi
                                </a>
                            </li>

                            <li>
                                <a class="dropdown-item"
                                   th:href="@{/user/bookings}">
                                    <i class="fa-solid fa-ticket me-2"></i>
                                    Vé của tôi
                                </a>
                            </li>
                        </ul>
                    </li>
                </ul>

                <!-- USER INFO -->
                <div class="dropdown">
                    <a href="#"
                       class="d-flex align-items-center text-decoration-none text-white dropdown-toggle"
                       data-bs-toggle="dropdown">

                        <img th:src="${#authentication.principal.user.avatarUrl != null
                          ? #authentication.principal.user.avatarUrl
                          : '/images/default-avatar.png'}"
                             class="rounded-circle"
                             width="40"
                             height="40">
                        <span class="ms-2"
                              th:text="${#authentication.principal.user.username}">
                        </span>
                    </a>

                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item"
                               th:href="@{/profile}">
                                <i class="fa-solid fa-user-gear me-2"></i>
                                Cài đặt tài khoản
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item"
                               th:href="@{/profile/change-password}">
                                <i class="fa-solid fa-key me-2"></i>
                                Đổi mật khẩu
                            </a>
                        </li>

                        <li>
                            <a class="dropdown-item"
                               th:href="@{/home}">
                                <i class="fa-solid fa-house me-2"></i>
                                Trang chủ
                            </a>
                        </li>

                        <li><hr class="dropdown-divider"></li>

                        <li>
                            <form th:action="@{/logout}" method="post">
                                <input type="hidden"
                                       th:name="${_csrf.parameterName}"
                                       th:value="${_csrf.token}">

                                <button type="submit"
                                        class="dropdown-item text-danger">
                                    <i class="fa-solid fa-right-from-bracket me-2"></i>
                                    Đăng xuất
                                </button>
                            </form>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <!-- CONTENT -->
    <main class="flex-grow-1 bg-light">
        <div layout:fragment="content"></div>
    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/previewAvatar.js"></script>

</body>
</html>
