<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <!--  fragment riêng cho CSS  -->
    <th:block layout:fragment="css"></th:block>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="dashboard-body">

<div class="d-flex min-vh-100">

    <!-- SIDEBAR -->
    <aside class="sidebar">

        <!-- USER INFO -->
        <div class="text-center mb-4">

            <img th:src="${#authentication.principal.user.avatarUrl != null
                      ? #authentication.principal.user.avatarUrl
                      : '/images/default-avatar.png'}"
                 class="user-avatar">

            <h5 class="mt-3 fw-bold">
                <span th:text="${#authentication.principal.user.username}"></span>
            </h5>

        </div>

        <!-- ADMIN -->
        <div sec:authorize="hasRole('ADMIN')">

            <a th:href="@{/admin/dashboard}" class="sidebar-link">
                <i class="fa-solid fa-gauge me-2"></i>
                Quản lý chung
            </a>

            <a th:href="@{/admin/movies}" class="sidebar-link">
                <i class="fa-solid fa-film me-2"></i>
                Quản lý phim
            </a>

            <a th:href="@{/admin/showtimes}" class="sidebar-link">
                <i class="fa-regular fa-calendar"></i>
                Quản lý lịch chiếu
            </a>

            <a th:href="@{/staff/staff}" class="sidebar-link">
                <i class="fa-solid fa-user-tie me-2"></i>
                Quản lý nhân viên
            </a>

            <a th:href="@{/admin/users}" class="sidebar-link">
                <i class="fa-solid fa-users me-2"></i>
                Quản lý người dùng
            </a>

            <a th:href="@{/profile}" class="sidebar-link">
                <i class="fa-solid fa-user-gear me-2"></i>
                Cài đặt tài khoản
            </a>

        </div>

        <!-- STAFF -->
        <div sec:authorize="hasRole('STAFF')">

            <a th:href="@{/staff/dashboard}" class="sidebar-link">
                <i class="fa-solid fa-user me-2"></i>
                Trang nhân viên
            </a>

            <a th:href="@{/staff/schedules}" class="sidebar-link">
                <i class="fa-solid fa-calendar me-2"></i>
                Lịch chiếu
            </a>

            <a th:href="@{/staff/tickets}" class="sidebar-link">
                <i class="fa-solid fa-ticket me-2"></i>
                Vé đặt
            </a>

            <a th:href="@{/profile}" class="sidebar-link">
                <i class="fa-solid fa-user-gear me-2"></i>
                Cài đặt tài khoản
            </a>

        </div>

        <!-- USER -->
        <div sec:authorize="hasRole('USER')">

            <a th:href="@{/user/profile}" class="sidebar-link">
                <i class="fa-solid fa-user me-2"></i>
                Trang của tôi
            </a>

            <a th:href="@{/user/tickets}" class="sidebar-link">
                <i class="fa-solid fa-ticket me-2"></i>
                Vé của tôi
            </a>

            <a th:href="@{/profile}" class="sidebar-link">
                <i class="fa-solid fa-user-gear me-2"></i>
                Cài đặt tài khoản
            </a>

        </div>

        <hr>

        <a th:href="@{/profile/change-password}"
           class="sidebar-link">
            <i class="fa-solid fa-key me-2"></i>
            Đổi mật khẩu
        </a>

        <form th:action="@{/logout}" method="post" class="mt-3">

            <input type="hidden"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}">

            <button type="submit"
                    class="btn btn-outline-danger w-100">
                Đăng xuất
            </button>

        </form>

        <hr>

        <a th:href="@{/home}"
           class="sidebar-link text-danger">
            ← Trang chủ
        </a>

    </aside>

    <!-- CONTENT -->
    <main class="flex-grow-1 bg-light">

        <div layout:fragment="content"></div>

    </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/js/previewAvatar.js"></script>

</body>
</html>
