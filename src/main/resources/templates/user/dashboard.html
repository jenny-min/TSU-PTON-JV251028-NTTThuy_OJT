<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Trang người dùng</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<!-- NAVBAR -->
<div th:replace="~{layouts/navbar :: navbar}"></div>
<!-- CONTENT -->
<div class="dashboard-container container">

    <div class="welcome mb-4">
        Trang user
    </div>

    <!-- CARDS -->
    <div class="row g-3">

        <div class="col-md-4">
            <div class="card card-box p-3">
                <h5>Thông tin cá nhân</h5>
                <p>Quản lý thông tin cá nhân</p>
                <a th:href="@{/profile}" class="btn btn-primary btn-sm">Xem chi tiết</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-box p-3">
                <h5>Xem phim</h5>
                <p>Xem danh sách phim</p>
                <a href="#" class="btn btn-success btn-sm">Xem chi tiết</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-box p-3">
                <h5>Đặt vé</h5>
                <p>Xem lịch chiếu</p>
                <a href="#" class="btn btn-success btn-sm">Xem chi tiết</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-box p-3">
                <h5>Chọn ghế</h5>
                <p>Chọn ghế theo phim</p>
                <a href="#" class="btn btn-success btn-sm">Xem chi tiết</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-box p-3">
                <h5>Hủy vé</h5>
                <p>Chọn phim cần hủy vé</p>
                <a href="#" class="btn btn-success btn-sm">Xem chi tiết</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card card-box p-3">
                <h5>Lịch sử mua vé</h5>
                <p>Xem lịch sử mua vé</p>
                <a href="#" class="btn btn-warning btn-sm">Xem chi tiết</a>
            </div>
        </div>

    </div>

</div>
<div th:replace="~{layouts/footer :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
