<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">

<div layout:fragment="content">
    <div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8">
        <div class="sm:mx-auto sm:w-full sm:max-w-sm">
            <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-white">Đăng nhập</h2>
        </div>

        <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
            <form th:action="@{/login}" method="POST" class="space-y-6">
                <input type="hidden"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}" />
                <div>
                    <label for="username" class="block text-sm/6 font-medium text-gray-100">Tên đăng nhập</label>
                    <div class="mt-2">
                        <input id="username" type="text" name="username" required autocomplete="username" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                    </div>
                </div>

                <div>
                    <div class="flex items-center justify-between">
                        <label for="password" class="block text-sm/6 font-medium text-gray-100">Mật khẩu</label>
                        <div class="text-sm">
                            <a href="#" class="font-semibold text-gray-100 hover:text-indigo-300">Quên mật khẩu?</a>
                        </div>
                    </div>
                    <div class="mt-2">
                        <input id="password" type="password" name="password" required autocomplete="current-password" class="block w-full rounded-md bg-white/5 px-3 py-1.5 text-base text-white outline-1 -outline-offset-1 outline-white/10 placeholder:text-gray-500 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-500 sm:text-sm/6" />
                    </div>
                </div>

                <div>
                    <button type="submit" class="flex w-full justify-center rounded-md border border-red-500 px-3 py-1.5 text-sm/6 font-semibold text-white hover:bg-red-500 transition focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-500">Đăng nhập</button>
                </div>
            </form>
            <div th:if="${param.error}"
                 class="rounded-md bg-red-500/20 border border-red-500 p-3 text-red-300">
                Sai tài khoản hoặc mật khẩu!
            </div>

            <p class="mt-10 text-center text-sm/6 text-gray-400">
                Chưa có tài khoản?
                <a th:href="@{/register}" class="font-semibold text-gray-100 hover:text-indigo-300">Đăng ký ngay!</a>
            </p>
        </div>
    </div>
</div>

</html>
