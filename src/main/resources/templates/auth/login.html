<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">

<th:block layout:fragment="css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
</th:block>

<div layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card login-card shadow-lg border-0">
                    <div class="card-body p-4">
                        <h2 class="text-center fw-bold mb-4">
                            Đăng nhập
                        </h2>
                        <form th:object="${loginRequest}" th:action="@{/login}" method="post">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />

                            <div class="mb-3">
                                <label for="username" class="form-label">
                                    Tên đăng nhập
                                </label>

                                <input type="text"
                                       th:field="*{username}"
                                       id="username"
                                       name="username"
                                       class="form-control"
                                       required
                                       autocomplete="username">
                            </div>

                            <div class="mb-3">
                                <div class="d-flex justify-content-between">
                                    <label for="password" class="form-label">
                                        Mật khẩu
                                    </label>

                                    <a href="#"
                                       class="small text-decoration-none">
                                        Quên mật khẩu?
                                    </a>
                                </div>

                                <input type="password"
                                       th:field="*{password}"
                                       id="password"
                                       name="password"
                                       class="form-control"
                                       required
                                       autocomplete="current-password">

                            </div>

                            <div class="d-grid">
                                <button type="submit" class="btn btn-danger login-btn">
                                    Đăng nhập
                                </button>
                            </div>

                        </form>

                        <div th:if="${param.error}" class="alert alert-danger mt-3 mb-0">
                            Sai tài khoản hoặc mật khẩu!
                        </div>

                        <p class="text-center mt-4 mb-0">
                            Chưa có tài khoản?
                            <a th:href="@{/register}" class="fw-semibold text-decoration-none">
                                Đăng ký ngay!
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
