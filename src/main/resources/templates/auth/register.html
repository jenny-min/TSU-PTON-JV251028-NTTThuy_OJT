<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/base}">

<th:block layout:fragment="css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</th:block>

<div layout:fragment="content">
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card register-card shadow-lg border-0">
                    <div class="card-body p-4 p-md-5">
                        <h2 class="text-center fw-bold mb-4">
                            Đăng ký tài khoản
                        </h2>

                        <form th:action="@{/register}"
                              th:object="${user}"
                              method="post">
                            <input type="hidden"
                                   th:name="${_csrf.parameterName}"
                                   th:value="${_csrf.token}" />

                            <div class="row">
                                <!-- Username -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Tên đăng nhập
                                    </label>
                                    <input th:field="*{username}"
                                           type="text"
                                           class="form-control"
                                           required>
                                </div>

                                <!-- Email -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Email
                                    </label>
                                    <input th:field="*{email}"
                                           type="email"
                                           class="form-control"
                                           required>
                                </div>

                                <!-- Password -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Mật khẩu
                                    </label>
                                    <input th:field="*{password}"
                                           type="password"
                                           class="form-control"
                                           required>
                                </div>

                                <!-- Confirm Password -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Xác nhận mật khẩu
                                    </label>
                                    <input th:field="*{confirmPassword}"
                                           type="password"
                                           class="form-control"
                                           required>
                                </div>

                                <!-- Full Name -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Họ và tên
                                    </label>
                                    <input th:field="*{fullName}"
                                           type="text"
                                           class="form-control"
                                           required>
                                </div>

                                <!-- Phone -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Số điện thoại
                                    </label>
                                    <input th:field="*{phone}"
                                           type="text"
                                           class="form-control"
                                           required>
                                </div>

                                <!-- Gender -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Giới tính
                                    </label>

                                    <select th:field="*{gender}"
                                            class="form-select">

                                        <option value="">
                                            -- Chọn giới tính --
                                        </option>

                                        <option th:each="g : ${genders}"
                                                th:value="${g}"
                                                th:text="${g.label}">
                                        </option>

                                    </select>
                                </div>

                                <!-- Birthday -->
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">
                                        Ngày sinh
                                    </label>

                                    <input th:field="*{birthday}"
                                           type="date"
                                           class="form-control"
                                           required>
                                </div>

                                <!-- Address -->
                                <div class="col-12 mb-3">
                                    <label class="form-label">
                                        Địa chỉ
                                    </label>

                                    <input th:field="*{address}"
                                           type="text"
                                           class="form-control">
                                </div>

                            </div>

                            <div class="d-grid mt-3">
                                <button type="submit"
                                        class="btn btn-danger register-btn">
                                    Đăng ký
                                </button>
                            </div>

                        </form>

                        <div th:if="${param.error}"
                             class="alert alert-danger mt-3">
                            Có lỗi xảy ra khi đăng ký!
                        </div>

                        <p class="text-center  mt-4 mb-0">

                            Đã có tài khoản?

                            <a th:href="@{/login}"
                               class="fw-semibold text-decoration-none">
                                Đăng nhập ngay!
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
