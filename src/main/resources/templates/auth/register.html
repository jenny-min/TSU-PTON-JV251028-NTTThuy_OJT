<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/login.css}">
    <link rel="stylesheet" th:href="@{/css/register.css}">
</head>
<body>

<div th:replace="~{layouts/header :: header}"></div>

<div class="auth-container">
    <div class="auth-card register-card">

            <div class="card-header text-center">
                <h3>Đăng ký</h3>
            </div>

            <div class="card-body">

                <form th:action="@{/register}" th:object="${user}" method="post">
                    <!-- Username -->
                    <div class="mb-3">
                        <label>Tên đăng nhập</label>
                        <input type="text" class="form-control" th:field="*{username}">
                        <div class="error-text" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label>Email</label>
                        <input type="email" class="form-control" th:field="*{email}">
                        <div class="error-text" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label>Mật khẩu</label>
                        <input type="password" class="form-control" th:field="*{password}">
                        <div class="error-text" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-3">
                        <label>Xác nhận mật khẩu</label>
                        <input type="password" class="form-control" th:field="*{confirmPassword}">
                        <div class="error-text" th:if="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
                    </div>

                    <!-- Full Name -->
                    <div class="mb-3">
                        <label>Họ và tên</label>
                        <input type="text" class="form-control" th:field="*{fullName}">
                    </div>

                    <!-- Phone -->
                    <div class="mb-3">
                        <label>Số điện thoại</label>
                        <input type="text" class="form-control" th:field="*{phone}">
                    </div>

                    <!-- Gender -->
                    <div class="mb-3">
                        <label>Giới tính</label>

                        <select class="form-select" th:field="*{gender}">
                            <option value="">-- Select --</option>

                            <option th:each="g : ${genders}"
                                    th:value="${g}"
                                    th:text="${g.label}">
                            </option>
                        </select>
                    </div>

                    <!-- Birthday -->
                    <div class="mb-3">
                        <label>Ngày sinh</label>
                        <input type="date" class="form-control" th:field="*{birthday}">
                    </div>

                    <!-- Address -->
                    <div class="mb-3">
                        <label>Địa chỉ</label>
                        <textarea class="form-control" th:field="*{address}"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        Đăng ký
                    </button>
                </form>

                <div class="text-center mt-3">
                    <a th:href="@{/login}">Đã có tài khoản? Đăng nhập ngay</a>
                </div>

            </div>
    </div>



</div>

<div th:replace="~{layouts/footer :: footer}"></div>

</body>
</html>
